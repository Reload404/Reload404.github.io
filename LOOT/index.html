          <script>
    // 稀有度映射表（用于显示名称和内部值）
    const RARITY_MAP = {
        'common': '常见',
        'uncommon': '非常见',
        'rare': '珍稀',
        'very-rare': '非常珍稀',
        'legendary': '传说',
        'artifact': '神器',
        'unknown': '不明',
        'unknown-magic': '不明（魔法）'
    };

    // 类型映射（显示名称），未知类型直接显示原值
    function getTypeLabel(type) {
        const map = {
            'weapon': '武器',
            'armor': '防具',
            'item': '道具',
            'consumable': '消耗品',
            'junk': '杂物',
            'material': '材料'
        };
        return map[type] || type;
    }

    let items = [];

    async function loadData() {
        const footer = document.getElementById('status-footer');
        const genBtn = document.getElementById('generate-button');
        try {
            const res = await fetch('/loot-data/items.json');
            if (!res.ok) throw new Error('数据文件不存在或读取失败');
            items = await res.json();
            footer.textContent = `已加载 ${items.length} 个物品`;
            genBtn.disabled = false;
            showNotification('数据加载成功');
        } catch (err) {
            footer.textContent = '数据加载失败，请确保已部署 JSON 文件';
            genBtn.disabled = true;
            showNotification('⚠️ 数据加载失败，请检查 loot-data/items.json 是否存在');
            console.error(err);
        } finally {
            // 无论是否加载成功，都构建筛选按钮
            buildRarityButtons();
            buildTypeButtons();
        }
    }

    // 构建稀有度按钮
    function buildRarityButtons() {
        const container = document.getElementById('rarity-buttons');
        container.innerHTML = '';
        Object.entries(RARITY_MAP).forEach(([value, label]) => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn active'; // 默认全选
            btn.dataset.value = value;
            btn.textContent = label;
            btn.addEventListener('click', () => {
                btn.classList.toggle('active');
            });
            container.appendChild(btn);
        });
    }

    // 根据物品数据动态构建类型按钮
    function buildTypeButtons() {
        const container = document.getElementById('type-buttons');
        container.innerHTML = '';
        if (!items.length) {
            container.innerHTML = '<span class="text-text-secondary">暂无类型数据（物品库为空）</span>';
            return;
        }
        // 收集所有类型并去重
        const typeSet = new Set();
        items.forEach(item => {
            if (item.type) typeSet.add(item.type);
        });
        if (typeSet.size === 0) {
            container.innerHTML = '<span class="text-text-secondary">物品中无类型字段</span>';
            return;
        }
        // 排序
        const sortedTypes = Array.from(typeSet).sort();
        sortedTypes.forEach(type => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn active'; // 默认全选
            btn.dataset.value = type;
            btn.textContent = getTypeLabel(type);
            btn.addEventListener('click', () => {
                btn.classList.toggle('active');
            });
            container.appendChild(btn);
        });
    }

    // 获取当前选中的稀有度值
    function getSelectedRarities() {
        const buttons = document.querySelectorAll('#rarity-buttons .filter-btn.active');
        return Array.from(buttons).map(btn => btn.dataset.value);
    }

    // 获取当前选中的类型值
    function getSelectedTypes() {
        const buttons = document.querySelectorAll('#type-buttons .filter-btn.active');
        return Array.from(buttons).map(btn => btn.dataset.value);
    }

    function generateLoot() {
        const count = parseInt(document.getElementById('generate-count').value);
        const selectedRarities = getSelectedRarities();
        const selectedTypes = getSelectedTypes();

        if (!items.length) {
            showNotification('物品库为空');
            return;
        }

        let filtered = items;
        // 稀有度过滤：有选中项则必须匹配其中之一
        if (selectedRarities.length > 0) {
            filtered = filtered.filter(i => selectedRarities.includes(i.rarity));
        }
        // 类型过滤：有选中项则必须匹配其中之一
        if (selectedTypes.length > 0) {
            filtered = filtered.filter(i => selectedTypes.includes(i.type));
        }

        if (!filtered.length) {
            showNotification('没有符合筛选条件的物品');
            return;
        }

        const generatedItems = [];
        for (let i = 0; i < count; i++) {
            const randomIndex = Math.floor(Math.random() * filtered.length);
            const original = filtered[randomIndex];
            generatedItems.push({
                ...original,
                id: generateId()
            });
        }
        renderGeneratedItems(generatedItems);
    }

    function renderGeneratedItems(items) {
        const container = document.getElementById('generated-items');
        container.innerHTML = '';
        items.forEach(item => {
            const div = document.createElement('div');
            div.className = 'generated-item';
            div.innerHTML = `
                <div>
                    <h4 class="text-lg font-bold ${getRarityClass(item.rarity)}">${item.name}</h4>
                    <div class="text-sm text-text-secondary mt-1">
                        <span>稀有度: ${getRarityName(item.rarity)}</span> | 
                        <span>重量: ${item.weight}</span> | 
                        <span>类型: ${getTypeLabel(item.type)}</span>
                    </div>
                </div>
                <div class="mt-2 text-text-primary"><span class="font-bold text-gold-light">描述:</span> ${item.description}</div>
            `;
            container.appendChild(div);
        });
    }

    // 工具函数
    function generateId() {
        return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
    }

    function showNotification(message) {
        const bar = document.getElementById('notification-bar');
        const text = document.getElementById('notification-text');
        text.textContent = message;
        bar.classList.remove('hidden');
        clearTimeout(window.notifTimeout);
        window.notifTimeout = setTimeout(() => bar.classList.add('hidden'), 3000);
    }

    function getRarityClass(rarity) {
        const map = {
            'common': 'rarity-common', 'uncommon': 'rarity-uncommon', 'rare': 'rarity-rare',
            'very-rare': 'rarity-very-rare', 'legendary': 'rarity-legendary', 'artifact': 'rarity-artifact',
            'unknown': 'rarity-unknown', 'unknown-magic': 'rarity-unknown-magic'
        };
        return map[rarity] || '';
    }

    function getRarityName(rarity) {
        return RARITY_MAP[rarity] || rarity;
    }

    // 初始化事件
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('close-notification').addEventListener('click', () => {
            document.getElementById('notification-bar').classList.add('hidden');
        });
        document.getElementById('generate-button').addEventListener('click', generateLoot);
        loadData();
    });
</script>

<script>
  function show_runtime() {
    // 在这里设置你的精确建站时间（格式：年-月-日T时:分:秒）
    var start = new Date("2026-06-06T13:43:44");
    var now = new Date();
    var diff = now - start; // 毫秒差

    if (diff < 0) {
      document.getElementById("runtime_span").innerHTML = "刚刚开始";
      return;
    }

    var days = Math.floor(diff / (1000 * 60 * 60 * 24));
    var years = Math.floor(days / 365);
    var remainingDays = days % 365;

    var hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    var minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    var seconds = Math.floor((diff % (1000 * 60)) / 1000);

    document.getElementById("runtime_span").innerHTML =
      "本站已运行 " + years + " 年 " + remainingDays + " 天 " +
      pad(hours) + " 时 " + pad(minutes) + " 分 " + pad(seconds) + " 秒";
  }

  function pad(n) {
    return n < 10 ? "0" + n : n;
  }

  show_runtime();
  setInterval(show_runtime, 1000); // 每秒更新
</script>
