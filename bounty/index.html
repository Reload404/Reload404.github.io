<div id="cards-container" style="text-align:center; padding:30px; color:#c7b494;">加载中…</div>

<script>
(async function() {
  try {
    const res = await fetch('/articles.json');
    const posts = await res.json();

    // 仅保留标签含“悬赏”或“传闻”的文章
    const filteredPosts = posts.filter(post => 
      post.tags && (post.tags.includes('悬赏') || post.tags.includes('传闻'))
    );

    if (!filteredPosts.length) {
      document.getElementById('cards-container').innerHTML = '<p>暂无悬赏或传闻，前往酒馆打听更多消息。</p>';
      return;
    }

    let html = '<div class="card-grid">';
    filteredPosts.forEach(post => {
      const cats = post.categories.length ? `<span>📜 ${post.categories.join(', ')}</span>` : '';
      const date = `<span>📅 ${post.date}</span>`;
      const words = post.wordcount ? `<span>📝 ${post.wordcount} 字</span>` : '';
      const meta = `<div class="card-meta">${cats} ${date} ${words}</div>`;

      const desc = post.description ? `<div class="card-desc">${post.description}</div>` : '';

      const tags = post.tags.length ? post.tags.map(t => `<a href="/tags/${t}/">#${t}</a>`).join(' ') : '';
      const tagsHtml = tags ? `<div class="card-tags">${tags}</div>` : '';

      html += `
        <div class="card">
          <h2 class="card-title"><a href="/${post.path}">${post.title}</a></h2>
          ${meta}
          ${desc}
          <div class="card-footer">
            ${tagsHtml}
            <a class="card-btn" href="/${post.path}">揭下悬赏</a>
          </div>
        </div>
      `;
    });
    html += '</div>';
    document.getElementById('cards-container').innerHTML = html;
  } catch (e) {
    document.getElementById('cards-container').innerHTML = '<p>羊皮纸受潮了，请稍后重试。</p>';
    console.error(e);
  }
})();
</script>

<script>
  function show_runtime() {
    // 在这里设置你的精确建站时间（格式：年-月-日T时:分:秒）
    var start = new Date("2026-06-06T13:43:44");

    var days = Math.floor(diff / (1000 * 60 * 60 * 24));

      pad(hours) + " 时 " + pad(minutes) + " 分 " + pad(seconds) + " 秒";
  }

  function pad(n) {
